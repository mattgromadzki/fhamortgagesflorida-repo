backend:
  name: github
  repo: mattgromadzki/fhamortgagesflorida   # <-- change to your repo
  branch: main
  base_url: https://sveltia-cms-auth.mattgromadzki.workers.dev/    # <-- your sveltia-cms-auth worker URL

site_url: https://fhamortgagesflorida.com
display_url: https://fhamortgagesflorida.com
media_folder: public
public_folder: /

collections:
  - name: settings
    label: Site Settings
    delete: false
    editor: { preview: false }
    files:
      - name: site
        label: Global Settings (phone, NMLS, form key)
        file: src/data/settings.json
        fields:
          - { name: brand, label: Brand name, widget: string }
          - { name: phoneDisplay, label: Phone (shown on site), widget: string }
          - { name: phoneTel, label: Phone (tel: link), widget: string, hint: "Digits only with country code, e.g. +18885550142" }
          - { name: nmls, label: NMLS number, widget: string }
          - { name: web3formsKey, label: Web3Forms access key, widget: string, hint: "Get a free key at web3forms.com - this is what makes the lead forms deliver to you" }
          - { name: email, label: Contact email, widget: string, required: false }

  - name: blog
    label: Blog Posts
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    identifier_field: title
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: Meta description / summary, widget: text }
      - { name: keywords, label: Keywords, widget: string, required: false }
      - { name: pubDate, label: Publish date, widget: datetime, format: "YYYY-MM-DD" }
      - { name: draft, label: Draft (hide from site), widget: boolean, default: false }
      - { name: ogImage, label: Social image filename, widget: string, default: og-image.jpg, required: false }
      - name: faqs
        label: FAQs
        widget: list
        required: false
        fields:
          - { name: q, label: Question, widget: string }
          - { name: a, label: Answer, widget: text }
      - name: related
        label: Related links
        widget: list
        required: false
        fields:
          - { name: label, label: Link text, widget: string }
          - { name: href, label: URL (e.g. fha-loan-limits-florida.html), widget: string }
      - { name: body, label: Article body, widget: markdown }

  - name: cities
    label: City Pages
    folder: src/content/pages
    create: true
    extension: json
    format: json
    identifier_field: slug
    filter: { field: type, value: city }
    fields:
      - { name: slug, label: URL slug (no .html), widget: string }
      - { name: title, label: SEO title, widget: string }
      - { name: description, label: Meta description, widget: text }
      - { name: keywords, label: Keywords, widget: string, required: false }
      - { name: type, widget: hidden, default: city }
      - { name: ogImage, widget: string, default: og-image.jpg, required: false }
      - { name: draft, label: Draft (hide from site), widget: boolean, default: false }
      - { name: bodyHtml, label: Page content (HTML), widget: markdown, required: false }
      - { name: schema, label: JSON-LD schema blocks (advanced), widget: list, required: false, field: { name: item, label: Schema JSON, widget: text } }
      - { name: pageJs, label: Page script (advanced), widget: text, required: false }

  - name: counties
    label: County Pages
    folder: src/content/pages
    create: true
    extension: json
    format: json
    identifier_field: slug
    filter: { field: type, value: county }
    fields:
      - { name: slug, label: URL slug (no .html), widget: string }
      - { name: title, label: SEO title, widget: string }
      - { name: description, label: Meta description, widget: text }
      - { name: keywords, label: Keywords, widget: string, required: false }
      - { name: type, widget: hidden, default: county }
      - { name: ogImage, widget: string, default: og-image.jpg, required: false }
      - { name: draft, label: Draft (hide from site), widget: boolean, default: false }
      - { name: bodyHtml, label: Page content (HTML), widget: markdown, required: false }
      - { name: schema, label: JSON-LD schema blocks (advanced), widget: list, required: false, field: { name: item, label: Schema JSON, widget: text } }
      - { name: pageJs, label: Page script (advanced), widget: text, required: false }

  - name: pillars
    label: Guide Pages (Pillars)
    folder: src/content/pages
    create: true
    extension: json
    format: json
    identifier_field: slug
    filter: { field: type, value: pillar }
    fields:
      - { name: slug, label: URL slug (no .html), widget: string }
      - { name: title, label: SEO title, widget: string }
      - { name: description, label: Meta description, widget: text }
      - { name: keywords, label: Keywords, widget: string, required: false }
      - { name: type, widget: hidden, default: pillar }
      - { name: ogImage, widget: string, default: og-image.jpg, required: false }
      - { name: draft, label: Draft (hide from site), widget: boolean, default: false }
      - { name: bodyHtml, label: Page content (HTML), widget: markdown, required: false }
      - { name: schema, label: JSON-LD schema blocks (advanced), widget: list, required: false, field: { name: item, label: Schema JSON, widget: text } }
      - { name: pageJs, label: Page script (advanced), widget: text, required: false }

  - name: trust
    label: About / Trust Pages
    folder: src/content/pages
    create: true
    extension: json
    format: json
    identifier_field: slug
    filter: { field: type, value: trust }
    fields:
      - { name: slug, label: URL slug (no .html), widget: string }
      - { name: title, label: SEO title, widget: string }
      - { name: description, label: Meta description, widget: text }
      - { name: keywords, label: Keywords, widget: string, required: false }
      - { name: type, widget: hidden, default: trust }
      - { name: ogImage, widget: string, default: og-image.jpg, required: false }
      - { name: draft, label: Draft (hide from site), widget: boolean, default: false }
      - { name: bodyHtml, label: Page content (HTML), widget: markdown, required: false }
      - { name: schema, label: JSON-LD schema blocks (advanced), widget: list, required: false, field: { name: item, label: Schema JSON, widget: text } }
      - { name: pageJs, label: Page script (advanced), widget: text, required: false }

  - name: other
    label: Hubs & Other Pages
    folder: src/content/pages
    create: false
    extension: json
    format: json
    identifier_field: slug
    filter: { field: type, value: [hub, home, tool, page] }
    fields:
      - { name: slug, label: URL slug, widget: string }
      - { name: title, label: SEO title, widget: string }
      - { name: description, label: Meta description, widget: text }
      - { name: keywords, label: Keywords, widget: string, required: false }
      - { name: type, widget: hidden }
      - { name: ogImage, widget: string, default: og-image.jpg, required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: bodyHtml, label: Page content (HTML), widget: markdown, required: false }
      - { name: schema, label: JSON-LD schema blocks (advanced), widget: list, required: false, field: { name: item, label: Schema JSON, widget: text } }
      - { name: pageJs, label: Page script (advanced), widget: text, required: false }
