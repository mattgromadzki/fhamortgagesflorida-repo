  branch: main
  base_url: https://sveltia-cms-auth.mattgromadzki.workers.dev

site_url: https://fhamortgagesflorida.com
media_folder: public
public_folder: /

collections:
  - name: settings
    label: Site Settings
    delete: false
    files:
      - name: site
        label: Global Settings (phone, NMLS, form key)
        file: src/data/settings.json
        fields:
          - { label: Brand name, name: brand, widget: string }
          - { label: Phone (shown on site), name: phoneDisplay, widget: string }
          - { label: Phone (tel link), name: phoneTel, widget: string, hint: "Digits with country code, e.g. +18885550142" }
          - { label: NMLS number, name: nmls, widget: string }
          - { label: Web3Forms access key, name: web3formsKey, widget: string, hint: "Free key from web3forms.com - this makes the lead forms deliver to you" }
          - { label: Contact email, name: email, widget: string, required: false }

  - name: blog
    label: Blog Posts
    folder: src/content/blog
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Meta description, name: description, widget: text }
      - { label: Keywords, name: keywords, widget: string, required: false }
      - { label: Publish date, name: pubDate, widget: datetime }
      - { label: Draft (hide from site), name: draft, widget: boolean, default: false }
      - { label: Social image filename, name: ogImage, widget: string, required: false }
      - label: FAQs
        name: faqs
        widget: list
        required: false
        fields:
          - { label: Question, name: q, widget: string }
          - { label: Answer, name: a, widget: text }
      - label: Related links
        name: related
        widget: list
        required: false
        fields:
          - { label: Link text, name: label, widget: string }
          - { label: URL, name: href, widget: string }
      - { label: Article body, name: body, widget: markdown }

  - name: cities
    label: City Pages
    folder: src/content/pages
    create: true
    extension: json
    format: json
    identifier_field: slug
    filter:
      field: type
      value: city
    fields:
      - { label: URL slug (no .html), name: slug, widget: string }
      - { label: SEO title, name: title, widget: string }
      - { label: Meta description, name: description, widget: text }
      - { label: Keywords, name: keywords, widget: string, required: false }
      - { label: Type, name: type, widget: hidden, default: city }
      - { label: Social image, name: ogImage, widget: string, required: false }
      - { label: Draft (hide from site), name: draft, widget: boolean, default: false }
      - { label: Page content (HTML), name: bodyHtml, widget: markdown, required: false }
      - label: JSON-LD schema (advanced)
        name: schema
        widget: list
        required: false
        field: { label: Schema block, name: item, widget: text }
      - { label: Page script (advanced), name: pageJs, widget: text, required: false }

  - name: counties
    label: County Pages
    folder: src/content/pages
