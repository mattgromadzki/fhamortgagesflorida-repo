<text x="290" y="120" font-family="Helvetica,Arial,sans-serif" font-size="20" font-weight="700" fill="#16a34a" text-anchor="middle">FHA Loan</text>
<text x="710" y="120" font-family="Helvetica,Arial,sans-serif" font-size="20" font-weight="700" fill="#2f6f4e" text-anchor="middle">Conventional</text>
<rect x="150" y="300" width="120" height="140" rx="8" fill="#16a34a"/><text x="210.0" y="288" font-family="Helvetica,Arial,sans-serif" font-size="22" font-weight="700" fill="#0f3d2e" text-anchor="middle">3.5%</text><text x="210.0" y="470" font-family="Helvetica,Arial,sans-serif" font-size="16" fill="#557065" text-anchor="middle">Min down</text><rect x="330" y="360" width="120" height="80" rx="8" fill="#8fd6ab"/><text x="390.0" y="348" font-family="Helvetica,Arial,sans-serif" font-size="22" font-weight="700" fill="#0f3d2e" text-anchor="middle">3%</text><text x="390.0" y="470" font-family="Helvetica,Arial,sans-serif" font-size="16" fill="#557065" text-anchor="middle">Min down (FTHB)</text>
